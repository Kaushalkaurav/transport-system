<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Transport System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { justify-content: center; align-items: center; }
        .login-card { max-width: 400px; width: 100%; margin: 0 auto; text-align: center; }
    </style>
</head>
<body>

<div class="card login-card">
    <div class="card-header">
        <h2>Admin Login</h2>
        <p>Sign in to manage the transport system</p>
    </div>
    <div class="form-group" style="text-align: left;">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter  password">
    </div>
    <button onclick="login()" class="btn-primary" id="loginBtn">Login</button>
</div>

<script>
function login() {
    const pwd = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    btn.innerText = 'Logging in...';
    btn.disabled = true;

    fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pwd })
    })
    .then(res => {
        if (res.ok) {
            window.location.href = '/dashboard.html';
        } else {
            alert('Invalid Password');
            btn.innerText = 'Login';
            btn.disabled = false;
        }
    });
}
</script>

</body>
</html>
