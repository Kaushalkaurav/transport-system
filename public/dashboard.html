<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Transport System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="app-layout">

<aside class="sidebar">
    <h2>Transport System</h2>
    <nav>
        <a href="/dashboard.html" class="active">Dashboard</a>
        <a href="/addvehicle.html">Add Vehicle</a>
        <a href="/view_vehicles.html">View Vehicles</a>
        <a href="/drivers.html">Drivers</a>
        <a href="/trips.html">Trips</a>
        <a href="/maintenance.html">Maintenance</a>
    </nav>
    <button onclick="logout()" class="btn-logout">Logout</button>
</aside>

<main class="main-content">
    <div class="header-title">
        <h1>Dashboard Overview</h1>
        <p>High-level statistics for your transport fleet</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>Total Vehicles</h3>
            <p id="total-vehicles">0</p>
        </div>
        <div class="stat-card">
            <h3>Total Drivers</h3>
            <p id="total-drivers">0</p>
        </div>
        <div class="stat-card">
            <h3>Active Trips</h3>
            <p id="active-trips">0</p>
        </div>
    </div>

    <div class="card" style="margin-top: 30px; max-width: 600px;">
        <canvas id="overviewChart"></canvas>
    </div>
</main>

<script>
function loadStats() {
    fetch('/dashboard/stats')
    .then(res => res.json())
    .then(data => {
        document.getElementById('total-vehicles').innerText = data.vehicles;
        document.getElementById('total-drivers').innerText = data.drivers;
        document.getElementById('active-trips').innerText = data.activeTrips;

        const ctx = document.getElementById('overviewChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Vehicles', 'Drivers', 'Active Trips'],
                datasets: [{
                    label: 'System Overview',
                    data: [data.vehicles, data.drivers, data.activeTrips],
                    backgroundColor: ['#3b82f6', '#10b981', '#f59e0b']
                }]
            },
            options: {
                scales: {
                    y: { beginAtZero: true, ticks: { stepSize: 1 } }
                }
            }
        });
    });
}

function logout() {
    fetch('/auth/logout', { method: 'POST' })
    .then(() => window.location.href = '/index.html');
}

window.onload = loadStats;
</script>

</body>
</html>
