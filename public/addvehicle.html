<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Vehicle | Transport System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="app-layout">

<aside class="sidebar">
    <h2>Transport System</h2>
    <nav>
        <a href="/dashboard.html">Dashboard</a>
        <a href="/addvehicle.html" class="active">Add Vehicle</a>
        <a href="/view_vehicles.html">View Vehicles</a>
        <a href="/drivers.html">Drivers</a>
        <a href="/trips.html">Trips</a>
        <a href="/maintenance.html">Maintenance</a>
    </nav>
</aside>

<main class="main-content">
    <div class="container" style="margin: 0;">
        <div class="card">
            <div class="card-header">
                <h2>Add New Vehicle</h2>
                <p>Enter the vehicle details below</p>
            </div>

            <div class="form-group">
                <label>Vehicle ID</label>
                <input type="number" id="vehicle_id" placeholder="e.g. 101">
            </div>
            <div class="form-group">
                <label>Vehicle Type</label>
                <input type="text" id="type" placeholder="e.g. Truck, Van, Car">
            </div>
            <div class="form-group">
                <label>Brand</label>
                <input type="text" id="brand" placeholder="e.g. Ford, Toyota">
            </div>
            <div class="form-group">
                <label>Model</label>
                <input type="text" id="model" placeholder="e.g. F-150, Camry">
            </div>
            <div class="form-group">
                <label>Owner Name</label>
                <input type="text" id="owner" placeholder="e.g. kaushal kaurav">
            </div>

            <button onclick="addVehicle()" class="btn-primary" id="btn-add">Add Vehicle</button>
        </div>
    </div>
</main>

<div id="toast" class="toast">
    <span id="toast-msg"></span>
</div>

<script>
function showToast(message, isError = false) {
    const toast = document.getElementById('toast');
    document.getElementById('toast-msg').innerText = message;
    toast.style.background = isError ? '#ef4444' : '#10b981';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}

function addVehicle() {
    const vehicle_id = document.getElementById('vehicle_id').value;
    const type = document.getElementById('type').value;
    const brand = document.getElementById('brand').value;
    const model = document.getElementById('model').value;
    const owner = document.getElementById('owner').value;

    if (!vehicle_id || !type || !brand || !model || !owner) {
        return showToast('Please fill all fields!', true);
    }

    const btn = document.getElementById('btn-add');
    btn.disabled = true;

    fetch('/vehicles', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ vehicle_id, type, brand, model, owner_name: owner })
    })
    .then(res => {
        if(res.ok) {
            showToast('Vehicle added!');
            document.querySelectorAll('input').forEach(i => i.value = '');
        } else {
            showToast('Error adding vehicle', true);
        }
    })
    .finally(() => btn.disabled = false);
}
</script>
</body>
</html>
